version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: my_diary_friend_db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-postgres}
    ports:
      - "${DB_PORT:-54322}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount migrations to be executed on startup if using standard postgres init
      # Or we can let the app run them.
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my_diary_friend_app
    restart: always
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-postgres}
      - HUGGING_FACE_MODEL_DIR=/app/hf_models/models/gte-small
    volumes:
      - .:/app
      - /app/node_modules
      - hf_models_volume:/app/hf_models
    networks:
      - app-network
    # Default command for development
    command: pnpm start:dev

volumes:
  postgres_data:
  hf_models_volume:

networks:
  app-network:
    driver: bridge